; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
extra_deps =
    open-autonomy==0.21.22

[pytest]
tomte_defaults = true
; `-p no:pytest_anchorpy` disables anchorpy's pytest11 entry point (pulled
; in transitively via open-aea-ledger-solana / open-autonomy[all]). Its
; plugin imports a stale `pytest_xprocess.getrootdir` and crashes pytest
; collection. No tests in this repo use anchorpy fixtures. Same shim
; mech-client and trader carry.
addopts = -p no:pytest_anchorpy

[mypy]
python_version = 3.10
strict_optional = True
warn_unused_ignores = False
warn_redundant_casts = False

[mypy-multiaddr.*]
ignore_missing_imports = True


[Authorized Packages]
open-autonomy: ==0.21.22
propel-client: *
typing-extensions: *
attrs: *
sniffio: *
aiohttp: *
anyio: *
click: *
flask: *
idna: *
iniconfig: *
jsonschema-specifications: *
markupsafe: *
packaging: *
referencing: *
rpds-py: *
tomli: *
urllib3: *
werkzeug: *
; OA 0.21.22 / open-aea-ledger-solana transitive deps lacking PyPI license
; metadata (verified against upstream LICENSE files).
anchorpy: 0.20.2
based58: 0.1.1
bitarray: *
jsonalias: 0.1.1
regex: *
; httpx: pulled in via solana << anchorpy << open-aea-ledger-solana. uv
; resolves a pre-release (1.0.dev3) under prerelease = "allow", and that
; build's PyPI metadata ships no License field. httpx is BSD-3-Clause
; upstream. Same shim mech-client carries.
httpx: >=0
