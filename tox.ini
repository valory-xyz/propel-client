; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
extra_deps =
    open-autonomy==0.21.23

[pytest]
tomte_defaults = true
; `-p no:pytest_anchorpy` disables anchorpy's pytest11 entry point (pulled
; in transitively via open-aea-ledger-solana / open-autonomy[all]). Its
; plugin imports a stale `pytest_xprocess.getrootdir` and crashes pytest
; collection. No tests in this repo use anchorpy fixtures. Same shim
; mech-client and trader carry.
addopts = -p no:pytest_anchorpy

[mypy]
python_version = 3.10
strict_optional = True
warn_unused_ignores = False
warn_redundant_casts = False


[Authorized Packages]
open-autonomy: ==0.21.23
propel-client: *
typing-extensions: *
attrs: *
sniffio: *
aiohttp: *
anyio: *
click: *
flask: *
idna: *
iniconfig: *
jsonschema-specifications: *
markupsafe: *
packaging: *
referencing: *
rpds-py: *
tomli: *
urllib3: *
werkzeug: *
; OA 0.21.23 / open-aea-ledger-solana transitive deps lacking PyPI license
; metadata (verified against upstream LICENSE files).
anchorpy: *
based58: *
bitarray: *
jsonalias: *
regex: *
; httpx: solana << anchorpy << open-aea-ledger-solana pins httpx to a
; range only httpx 1.0.dev3 satisfies. The project-level
; `prerelease = "if-necessary"` in pyproject.toml makes `uv lock` pick
; httpx 0.28.1 (stable) for the developer venv, but tomte canonical's
; tox setenv forces UV_PRERELEASE=allow inside each testenv, so this
; liccheck env still resolves the dev build. dev3's PyPI metadata ships
; no License field. Upstream httpx is BSD-3-Clause. Same shim mech-client
; carries.
httpx: >=0
