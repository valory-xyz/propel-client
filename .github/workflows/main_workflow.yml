name: main_workflow

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lock_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10"]

    defaults:
      run:
        shell: bash

    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Check if dependencies can be locked
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --all-groups -v

  copyright_and_dependencies_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
      - name: Check copyright headers
        run: tomte check-copyright --author valory
      - name: License compatibility check
        run: tomte tox -e liccheck

  linter_checks:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
      - name: Security checks
        run: tomte tox -p -e safety -e bandit
      - name: Code checks
        run: tomte tox -p -e black-check -e isort-check -e flake8 -e mypy -e pylint -e darglint

  scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.10.1/gitleaks_8.10.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.10.1_linux_x64.tar.gz
          sudo install gitleaks /usr/bin
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          tomte tox -e gitleaks

  test:
    continue-on-error: True
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - if: matrix.os == 'ubuntu-24.04'
        name: Install dependencies (ubuntu-24.04)
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv

      - if: matrix.os == 'ubuntu-24.04'
        name: Unit tests on ubuntu-24.04
        run: tomte tox -e py${{ matrix.python-version }}-linux

      - if: matrix.os == 'macos-15'
        name: Install dependencies (macos-15)
        run: |
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          brew install gcc

      - if: matrix.os == 'macos-15'
        name: Unit tests on macos-15
        run: tomte tox -e py${{ matrix.python-version }}-darwin

      - if: matrix.os == 'windows-2025'
        name: Install dependencies (windows-2025)
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: true
        run: |
          python -m pip install -U pip
          choco install wget -y
          choco install mingw -y
          choco install make -y
          make --version
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv

      - if: matrix.os == 'windows-2025'
        name: Unit tests on windows-2025
        run: tomte tox -e py${{ matrix.python-version }}-win

  all_checks_passed:
    name: All checks passed
    if: always()
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
      - scan
      - test
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Success
        run: echo "All required checks passed"
